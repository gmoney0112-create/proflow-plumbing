name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: remotion/package-lock.json

      - name: Install Remotion dependencies
        run: npm ci
        working-directory: remotion

      - name: Build Remotion video preview
        run: npx vite build
        working-directory: remotion

      - name: Assemble deploy folder
        run: |
          mkdir -p deploy/video
          # Main ProFlow site at root
          cp index.html faq.html privacy.html thank-you.html deploy/
          # Remotion video preview at /video/
          cp -r remotion/dist/* deploy/video/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
