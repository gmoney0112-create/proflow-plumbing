name: Generate AI Video Clips

on:
  workflow_dispatch:
    inputs:
      scenes:
        description: 'Which scenes to generate (comma-separated or "all")'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - intro
          - services
          - stats
          - cta

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/remotion-video-rendering-1o1qrd

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate clips (parallel — all start at once)
        env:
          RUNWAY_KEY: ${{ secrets.RUNWAY_KEY }}
          KLING_API_KEY: ${{ secrets.KLING_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          SCENES_INPUT: ${{ inputs.scenes }}
        run: node remotion/scripts/gen-parallel-ci.mjs

      - name: Commit clips + updated videoAssets.ts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add remotion/public/ai-clips/ remotion/src/videoAssets.ts
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "feat: add AI-generated video clips for Remotion scenes [skip ci]"
          git push
